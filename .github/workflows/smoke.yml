name: smoke

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Show runtime versions
        run: |
          node --version
          python3 --version
          curl --version | head -n 1
      - name: Run smoke checks
        run: bash ./scripts/smoke-check.sh
