name: link-check-nightly

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run link quality check
        run: node ./scripts/check-links.js --concurrency 4 --timeout-ms 15000 --include-covers
