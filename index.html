<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <title>Batman Guide</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="batman-logo.png" type="image/png" />
  <style>
    :root {
      --bg: #070b16;
      --panel: #111827;
      --panel-2: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #facc15;
      --accent-2: #f59e0b;
      --border: #2f3d56;
      --danger: #ef4444;
      --shadow: 0 12px 28px rgba(0,0,0,.28);
      --shadow-soft: 0 6px 18px rgba(0,0,0,.2);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1400px 700px at 10% -10%, rgba(250, 204, 21, .13) 0%, transparent 55%),
        radial-gradient(900px 500px at 95% -15%, rgba(59, 130, 246, .14) 0%, transparent 60%),
        linear-gradient(180deg, #070b16 0%, #0b1224 100%);
    }
    .container { max-width: 1120px; margin: 0 auto; padding: 12px 16px; }
    .card {
      background: linear-gradient(180deg, rgba(17,24,39,.9), rgba(15,23,42,.82));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow-soft);
    }
    .top { position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); background: rgba(7,11,22,.78); border-bottom: 1px solid rgba(70, 85, 116, .45); transition: transform .28s ease, opacity .28s ease, box-shadow .28s ease; }
    .top.compact { box-shadow: 0 10px 20px rgba(0,0,0,.28); }
    .top.header-hidden { transform: translateY(calc(-100% + 14px)); opacity: .72; }
    .top.header-hidden:hover,
    .top.header-hidden:focus-within { transform: translateY(0); opacity: 1; }
    .top:hover,
    .top:focus-within { transform: translateY(0); opacity: 1; }
    .row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .space { justify-content: space-between; }
    h1 { margin: 0; font-size: 24px; letter-spacing: .2px; }
    .muted { color: var(--muted); font-size: 13px; }
    .top .container { padding-top: 10px; padding-bottom: 10px; }
    .hero { display: grid; gap: 6px; min-width: 0; }
    .hero-brand { display:flex; gap:12px; align-items:center; }
    .hero-logo { width:116px; height:40px; object-fit: contain; filter: drop-shadow(0 8px 20px rgba(0,0,0,.35)); }
    .header-main { display:flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
    .header-panel {
      border: 1px solid rgba(71, 85, 105, .45);
      border-radius: 12px;
      padding: 8px;
      background: rgba(15, 23, 42, .45);
    }
    .top-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .header-panel-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin: 0 0 6px 0; }
    .badge { display:inline-flex; width: fit-content; font-size: 11px; font-weight: 700; letter-spacing: .2px; text-transform: uppercase; color: #fde68a; border: 1px solid #6b5716; border-radius: 999px; padding: 3px 9px; background: rgba(250, 204, 21, .08); }
    .btn, .input, .select {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
    }
    .btn {
      cursor: pointer;
      font-weight: 700;
      box-shadow: var(--shadow-soft);
      background: linear-gradient(180deg, rgba(39, 50, 75, .95), rgba(24, 34, 54, .95));
      transition: transform .14s ease, border-color .14s ease, filter .14s ease;
    }
    .btn:hover { border-color: #4c638b; transform: translateY(-1px); filter: brightness(1.06); }
    .btn.primary { border-color: #7c640f; background: linear-gradient(180deg, #4a3c17, #332b14); color: #fde68a; }
    .btn.warn { border-color: #7f1d1d; background: linear-gradient(180deg,#4a1414,#341010); color: #fecaca; }
    .input, .select { min-width: 150px; }
    .input.full { width: 100%; }
    .status { font-size: 12px; color: var(--muted); }
    .progress-wrap { margin-top: 8px; padding: 8px; border: 1px solid rgba(71,85,105,.35); border-radius: 12px; background: rgba(15,23,42,.45); }
    .progress-track { height: 10px; background: #162132; border: 1px solid var(--border); border-radius: 999px; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #facc15, #fde68a); }
    .status-row { margin-top: 5px; gap: 10px; }
    .status-pills { display:flex; gap:6px; flex-wrap:wrap; }
    .status-pill { font-size: 11px; border:1px solid var(--border); border-radius:999px; padding: 1px 7px; color: var(--muted); }
    .status-pill strong { color: var(--text); font-size: 12px; }
    .era { margin-top: 14px; }
    details {
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(18, 26, 47, .78), rgba(13, 22, 39, .76));
      margin-bottom: 14px;
      box-shadow: var(--shadow-soft);
    }
    summary {
      list-style: none;
      cursor: pointer;
      padding: 13px 14px;
      background: linear-gradient(90deg, rgba(34, 48, 84, .72), rgba(27, 42, 68, .55));
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    summary::-webkit-details-marker { display: none; }
    .items { padding: 12px; }
    .item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      background: linear-gradient(180deg, rgba(15, 23, 42, .88), rgba(10, 17, 34, .88));
      transition: border-color .16s ease, transform .16s ease, background .2s ease;
    }
    .item-grid { display:grid; grid-template-columns: 64px 1fr; gap: 12px; align-items: start; }
    .item-head { display:flex; justify-content: space-between; gap: 10px; align-items: center; flex-wrap: wrap; }
    .item-title-row { display:flex; gap:10px; align-items:center; flex: 1; min-width: 0; }
    .item-title-row input[type="checkbox"] { margin: 0; width: 18px; height: 18px; accent-color: #60a5fa; }
    .item-link {
      flex-shrink: 0;
      white-space: nowrap;
      margin-left: auto;
      font-size: 13px;
      font-weight: 600;
      color: #dbeafe;
      text-decoration: none;
      border: 1px solid rgba(147, 197, 253, .38);
      border-radius: 999px;
      padding: 4px 10px;
      background: rgba(30, 64, 175, .16);
      transition: border-color .16s ease, background .16s ease, color .16s ease;
    }
    .item-link:hover,
    .item-link:focus-visible {
      color: #eff6ff;
      border-color: rgba(191, 219, 254, .7);
      background: rgba(37, 99, 235, .26);
      text-decoration: none;
    }
    .cover { width: 64px; height: 92px; border-radius: 10px; border:1px solid rgba(255,255,255,.2); display:grid; place-items:center; text-align:center; font-size:10px; font-weight:800; letter-spacing:.45px; color:#fff; text-transform:uppercase; box-shadow: 0 8px 16px rgba(0,0,0,.35); }
    .cover img { width:100%; height:100%; object-fit:cover; border-radius:10px; display:block; }
    .cover small { display:block; font-size:9px; opacity:.85; }
    .cover.fallback-logo { position: relative; background: radial-gradient(circle at 30% 20%, rgba(250,204,21,.16), rgba(15,23,42,.95)); }
    .cover.fallback-logo img { object-fit: contain; padding: 6px; opacity: .95; }
    .cover-fallback-label { position: absolute; left: 4px; right: 4px; bottom: 4px; border-radius: 999px; font-size: 9px; text-align:center; color: #f8fafc; background: rgba(2,6,23,.7); border: 1px solid rgba(148,163,184,.35); padding: 1px 4px; text-transform: uppercase; letter-spacing: .35px; }
    .item:hover { border-color: #6f86b1; transform: translateY(-1px); background: rgba(19, 31, 57, .86); }
    .item.done { opacity: .72; border-style: dashed; }
    .title { font-weight: 700; line-height: 1.25; font-size: 18px; }
    .tags { margin-top: 6px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .tag { font-size: 12px; color: #fde68a; border: 1px solid #725f0a; border-radius: 999px; padding: 1px 8px; }
    .progress-fields { margin-top: 10px; display:grid; grid-template-columns: minmax(180px, 240px) minmax(240px, 1fr); gap: 8px; }
    .stack { display: grid; gap: 8px; }
    .kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      border-radius: 6px;
      padding: 1px 6px;
      font-size: 11px;
      color: #e5e7eb;
      background: #0f172a;
    }
    .hidden { display: none; }
    .tools { margin-top: 10px; }
    .error {
      margin-top: 10px;
      border: 1px solid #7f1d1d;
      background: rgba(127, 29, 29, .25);
      color: #fecaca;
      border-radius: 10px;
      padding: 8px;
      font-size: 13px;
    }
    a { color: #93c5fd; text-underline-offset: 2px; }

    .meta-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap:6px; margin-top: 6px; }
    .meta-card { border:1px solid var(--border); border-radius: 10px; padding: 6px 8px; background: rgba(15, 23, 42, .55); }
    .meta-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .35px; }
    .meta-value { margin-top: 1px; font-weight: 700; font-size: 14px; }
    .header-controls { display:grid; gap:8px; }
    .filters { display: grid; grid-template-columns: minmax(190px, 1.5fr) minmax(130px, .8fr) auto auto; gap: 6px; align-items: center; }
    .advanced-controls { display:grid; grid-template-columns: minmax(170px, 1fr) repeat(3, auto); gap:6px; align-items:center; }
    .filters .input,
    .filters .select,
    .advanced-controls .select,
    .advanced-controls .btn,
    .filters .btn { width: 100%; }
    .quick-filters { display:flex; gap:6px; flex-wrap:wrap; }
    .chip {
      border: 1px solid var(--border);
      background: rgba(30, 41, 59, .7);
      color: var(--muted);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color .16s ease, color .16s ease, background .16s ease;
    }
    .chip.active {
      color: #fde68a;
      border-color: #7c640f;
      background: rgba(74, 60, 23, .55);
    }
    .item.continue-target { border-color: #7c640f; box-shadow: inset 0 0 0 1px rgba(250, 204, 21, .2), 0 8px 18px rgba(0,0,0,.28); }
    .continue-tag { color: #fde68a; border-color: #7c640f; background: rgba(250, 204, 21, .1); }
    .status-strip { border:1px solid rgba(71,85,105,.35); border-radius: 12px; padding: 8px; background: rgba(15,23,42,.45); }
    .controls-hint { margin-top: 2px; }
    .header-reveal {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 60;
      box-shadow: 0 10px 26px rgba(0,0,0,.35);
    }
    @media (max-width: 760px) {
      h1 { font-size: 24px; }
      .container { padding: 10px 12px; }
      .btn, .input, .select { width: 100%; }
      .filters { display: flex; }
      .advanced-controls { grid-template-columns: 1fr; }
      .top-actions { justify-content: stretch; }
      .top-actions .btn { flex: 1 1 110px; }
      .row.space { align-items: flex-start; }
      .item-grid { grid-template-columns: 68px 1fr; gap: 10px; }
      .cover { width: 68px; height: 96px; border-radius: 10px; }
      .title { font-size: 16px; }
      .item-head { flex-direction: row; align-items: center; gap: 8px; }
      .item-link { align-self: auto; margin-left: 0; }
      .progress-fields { grid-template-columns: 1fr; }
      .quick-filters { margin-top: 2px; }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="container stack">
      <div class="header-main header-panel">
        <div class="hero">
          <div class="hero-brand">
            <img id="heroLogo" src="./batman-logo.png" alt="Batman logo" class="hero-logo" />
            <div>
              <h1>Batman Guide</h1>
            </div>
          </div>
        </div>
        <div>
          <p class="header-panel-label">Quick actions</p>
          <div class="top-actions">
          <button class="btn" id="btnHeaderToggle" aria-expanded="false">Filters</button>
          <button class="btn" id="btnNext">Next unread</button>
          <button class="btn" id="btnContinue">Continue</button>
          <button class="btn" id="btnTop">Top</button>
          </div>
        </div>
      </div>

      <div class="header-controls header-panel">
        <div class="row filters">
          <input id="search" class="input" placeholder="Search titles..." />
          <select id="typeFilter" class="select">
            <option value="">All types</option>
            <option value="book">Books</option>
            <option value="collection">Collections</option>
            <option value="series">Series</option>
          </select>
          <label class="row muted"><input type="checkbox" id="onlyRemaining" /> only remaining</label>
          <label class="row muted"><input type="checkbox" id="hideOptional" /> hide optional</label>
          <select id="sortBy" class="select">
            <option value="order">Default order</option>
            <option value="title">Title A → Z</option>
            <option value="progress">Least progress first</option>
          </select>
          <button class="btn" id="btnToggleAdvanced" aria-expanded="false" aria-label="Show advanced controls">Advanced filters</button>
        </div>
        <div class="quick-filters" aria-label="Quick filters">
          <button class="chip" type="button" id="chipOpen">Open only</button>
          <button class="chip" type="button" id="chipRequired">Required only</button>
          <button class="chip" type="button" id="chipBook">Books</button>
        </div>
        <div class="row advanced-controls hidden" id="advancedControls">
          <select id="eraJump" class="select">
            <option value="">Jump to era…</option>
          </select>
          <button class="btn" id="btnToggleAllEras" aria-label="Toggle all era sections">Collapse all eras</button>
          <button class="btn hidden" id="btnExpandAll" type="button" tabindex="-1" aria-hidden="true">Expand all</button>
          <button class="btn hidden" id="btnCollapseAll" type="button" tabindex="-1" aria-hidden="true">Collapse all</button>
          <button class="btn" id="btnClearFilters">Clear filters</button>
        </div>
      </div>
      <div class="muted controls-hint">Tip: press <span class="kbd">/</span> to jump to search.</div>

      <div class="status-strip">
        <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
        <div class="row status-row">
          <div id="progressText" class="muted">Loading...</div>
          <div id="nextText" class="muted">Next: -</div>
          <div id="continueText" class="muted">Continue: -</div>
          <div class="status-pills">
            <span class="status-pill">Visible <strong id="statVisible">-</strong></span>
            <span class="status-pill">Done <strong id="statDone">-</strong></span>
            <span class="status-pill">Left <strong id="statRemaining">-</strong></span>
            <span class="status-pill">Required <strong id="statRequired">-</strong></span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <button class="btn header-reveal hidden" id="btnRevealHeader" type="button" aria-label="Show header controls">Show header</button>

  <main class="container">
    <div id="errorBox" class="error hidden"></div>
    <div id="main"></div>

    <section class="tools card">
      <h2 style="margin:0 0 8px 0;font-size:18px;">Sync</h2>
      <p class="muted" style="margin:0 0 10px 0;">Use a GitHub Gist as your shared save file between devices.</p>
      <div class="stack">
        <input id="gistId" class="input full" placeholder="Gist ID" />
        <input id="gistToken" class="input full" type="password" placeholder="GitHub token with gist scope" />
        <label class="row muted"><input type="checkbox" id="autoSync" checked /> auto sync</label>
        <div class="row">
          <button id="gistPull" class="btn">Pull</button>
          <button id="gistPush" class="btn">Push</button>
          <button id="gistSync" class="btn">Sync now</button>
          <button id="resetState" class="btn warn">Reset local progress</button>
        </div>
        <div class="row">
          <button id="exportState" class="btn">Export local backup</button>
          <label class="btn" for="importStateFile" style="display:inline-flex; align-items:center;">Import backup</label>
          <input id="importStateFile" type="file" accept="application/json" class="hidden" />
        </div>
        <div id="syncStatus" class="status">Auto-sync is off until Gist ID and token are filled.</div>
      </div>
    </section>
  </main>

  <script src="list.js"></script>
  <script src="app.js"></script>
  <script>
    (function () {
      const RECOVERY_KEY = "batman-guide:recovery-attempted";

      async function tryRecovery() {
        if (window.__BATMAN_APP_READY) return;
        const hasList = Array.isArray(window.BATMAN_GUIDE_LIST) && window.BATMAN_GUIDE_LIST.length > 0;
        if (!hasList) return;

        const attempted = sessionStorage.getItem(RECOVERY_KEY) === "1";
        if (attempted) return;
        sessionStorage.setItem(RECOVERY_KEY, "1");

        try {
          if ("serviceWorker" in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((r) => r.unregister()));
          }
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((k) => caches.delete(k)));
          }
        } catch {
          // best effort recovery
        }

        const u = new URL(window.location.href);
        u.searchParams.set("cache_bust", String(Date.now()));
        window.location.replace(u.toString());
      }

      window.addEventListener("load", () => {
        setTimeout(() => {
          void tryRecovery();
        }, 1400);
      });
    })();
  </script>

</body>
</html>
